name: split_uz
description: "A new Flutter project."
publish_to: 'none' 


version: 1.0.0+1

environment:
  sdk: ^3.12.1


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.10.0
  firebase_auth: ^6.5.2
  mask_text_input_formatter: ^2.9.0
  pinput: ^6.0.2
  bloc: ^9.2.1
  flutter_bloc: ^9.1.1
  go_router: ^17.3.0
  get_it: ^9.2.1
  cloud_firestore: ^6.5.0
  equatable: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/background/

  fonts:
    - family: MPLUS2
      fonts:
        - asset: assets/fonts/MPLUS2-Regular.ttf
          weight: 400
        - asset: assets/fonts/MPLUS2-Medium.ttf
          weight: 500
        - asset: assets/fonts/MPLUS2-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/MPLUS2-Bold.ttf
          weight: 700
